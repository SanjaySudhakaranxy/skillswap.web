name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build site for E2E
        run: npm run build

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=junit,html

      - name: Upload Playwright JUnit (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-junit
          path: reports/e2e-junit.xml

      - name: Upload Playwright HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/playwright-report

      - name: Publish Playwright JUnit to Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: playwright-e2e
          path: reports/e2e-junit.xml
